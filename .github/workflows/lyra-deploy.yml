name: Lyra AI Auto Deployer

on:
  push:
    paths:
      - 'lyra/**' # Sirf tab chalega jab lyra folder mein kuch naya add hoga
  workflow_dispatch: # Taake aap manually bhi chala sakein button daba kar

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Poori repository deploy karne ke liye '.' rakhein
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
