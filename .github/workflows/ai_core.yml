name: Offline AI Generation Engine

on:
  issues:
    types: [opened, edited]

jobs:
  ai-compilation:
    # Sirf unhi issues par chalega jinke title mein [AI] keyword hoga
    if: contains(github.event.issue.title, '[AI]')
    runs-on: ubuntu-latest

    steps:
    # Step 1: Repo code checkout karna
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Step 2: Python Framework set up karna
    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: Offline High-Performance GGUF runtime installation
    - name: Install Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install llama-cpp-python huggingface_hub

    # Step 4: Hugging Face Hub se ultra-lightweight powerful model fetch karna
    - name: Fetch Local GGUF Model
      run: |
        python -c "
        from huggingface_hub import hf_hub_download
        hf_hub_download(repo_id='Qwen/Qwen2.5-1.5B-Instruct-GGUF', filename='qwen2.5-1.5b-instruct-q4_k_m.gguf', local_dir='.')
        "

    # Step 5: Python Engine execution jo dynamic code logic generate karega
    - name: Execute Neural Pipeline
      env:
        PROMPT_DATA: ${{ github.event.issue.body }}
      run: |
        python - << 'EOF'
        import os
        from llama_cpp import Llama

        raw_prompt = os.getenv("PROMPT_DATA", "Create a basic container widget").strip()
        
        print("Loading local weights into runner RAM...")
        llm = Llama(
            model_path="qwen2.5-1.5b-instruct-q4_k_m.gguf",
            n_ctx=2048,
            n_threads=2
        )

        system_instruction = (
            "You are an elite web application designer. Generate a clean, single-file production "
            "ready webpage component based on the user request. Output ONLY valid HTML markup. Do not wrap code "
            "in markdown syntax like ```html. Start with <!DOCTYPE html>."
        )

        print(f"Processing query pipeline: {raw_prompt}")
        response = llm.create_chat_completion(
            messages=[
                {"role": "system", "content": system_instruction},
                {"role": "user", "content": raw_prompt}
            ],
            max_tokens=1600,
            temperature=0.6
        )

        clean_markup = response['choices'][0]['message']['content'].strip()

        # Cleaning logic block
        if clean_markup.startswith("```html"):
            clean_markup = clean_markup.replace("```html", "", 1)
        if clean_markup.endswith("```"):
            clean_markup = clean_markup[:-3]

        # Nayi dynamic file output generate karna (taaki main index.html chat page secure rahe)
        with open("generated_app.html", "w", encoding="utf-8") as f:
            f.write(clean_markup.strip())
            
        print("Asset compilation successful.")
        EOF

    # Step 6: Code core changes repository mein commit karna
    - name: Deploy Compiled Asset
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add generated_app.html
        git commit -m "Automated Asset Update: Compile via Issue #${{ github.event.issue.number }}" || exit 0
        git push

    # Step 7: Automatic issue track closure aur reply bot notification
    - name: Post Success Status Reply
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🚀 **MUHAMMAD TAQI KING AI Engine Status:**\n\nAapka user-requested web module kamyabi se generate ho chuka hai! Aap repository ke active files mein \`generated_app.html\` check kar sakte hain.`
          })
