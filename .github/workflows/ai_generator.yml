name: Offline AI Web Generator

on:
  # 1. Manual run karne ke liye aur user se prompt lene ke liye
  workflow_dispatch:
    inputs:
      user_prompt:
        description: 'AI se kya puchna chahte hain? (e.g., Create a beautiful portfolio page)'
        required: true
        default: 'Create a modern landing page for a tech startup called Nexura with dark mode.'

jobs:
  build-and-generate:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Repository ka code checkout karna
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Python environment setup karna
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-state: '3.10'

    # Step 3: Llama-cpp (CPU-based high-performance LLM runner) install karna
    - name: Install LLM Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install llama-cpp-python huggingface_hub

    # Step 4: Hugging Face se ek lightweight lekin powerful GGUF model download karna
    # Hum Qwen2.5-1.5B-Instruct-GGUF use kar rahe hain jo bohot fast hai aur low RAM leta hai
    - name: Download Lightweight AI Model
      run: |
        python -c "
        from huggingface_hub import hf_hub_download
        hf_hub_download(repo_id='Qwen/Qwen2.5-1.5B-Instruct-GGUF', filename='qwen2.5-1.5b-instruct-q4_k_m.gguf', local_dir='.')
        "

    # Step 5: Python Script chalana jo AI se response lega aur index.html generate karega
    - name: Run AI & Generate HTML
      env:
        USER_INPUT: ${{ github.event.inputs.user_prompt }}
      run: |
        python - << 'EOF'
        import os
        from llama_cpp import Llama

        user_prompt = os.getenv("USER_INPUT", "Hello AI")
        
        print(f"Loading AI Model...")
        # Model load karna (GitHub Runner ke 7GB RAM ke mutabiq optimized)
        llm = Llama(
            model_path="qwen2.5-1.5b-instruct-q4_k_m.gguf",
            n_ctx=2048,
            n_threads=2
        )

        # System prompt taaki AI sirf clean HTML return kare bina faltu baaton ke
        system_instruction = (
            "You are an expert frontend developer. Your task is to generate a complete, "
            "production-ready HTML file based on the user's request. Return ONLY the valid "
            "HTML code starting with <!DOCTYPE html> and ending with </html>. Do not include "
            "markdown blocks like ```html, and do not write explanations."
        )

        print(f"Generating content for prompt: {user_prompt}")
        
        # AI Se response lena
        response = llm.create_chat_completion(
            messages=[
                {"role": "system", "content": system_instruction},
                {"role": "user", "content": user_prompt}
            ],
            max_tokens=1500,
            temperature=0.7
        )

        ai_html_output = response['choices'][0]['message']['content'].strip()

        # Sanitize output (agar model ne galti se markdown backticks laga diye hon)
        if ai_html_output.startswith("```html"):
            ai_html_output = ai_html_output.replace("```html", "", 1)
        if ai_html_output.endswith("```"):
            ai_html_output = ai_html_output[:-3]
            
        ai_html_output = ai_html_output.strip()

        # index.html file generate karna
        with open("index.html", "w", encoding="utf-8") as f:
            f.write(ai_html_output)
            
        print("Successfully generated index.html!")
        EOF

    # Step 6: Generated index.html ko wapas repository mein commit aur push karna
    - name: Commit and Push Generated HTML
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add index.html
        # Agar koi change nahi hua toh error na aaye isliye || true lagaya hai
        git commit -m "Automated AI Update: Generated index.html based on prompt" || exit 0
        git push
