name: Ollama Neural Local Server Node

on:
  workflow_dispatch: # Manual trigger karne ke liye

jobs:
  run-ollama-node:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 1. Ollama Core System Install Karna
    - name: Install Ollama Engine
      run: |
        curl -fsSL https://ollama.com/install.sh | sh

    # 2. Ollama Background Service Start Karna
    - name: Start Ollama Service Loop
      run: |
        ollama serve &
        echo "Awaiting system handshake..."
        sleep 10

    # 3. Open-source Model Pull Aur Custom System Prompt Setup
    - name: Pull Model & Inject Owner Rules
      run: |
        # Chota aur fast model pulls karna (Llama3:8b ya Granite/Phi-3 aapki choice hai)
        ollama pull llama3:8b
        
        # Modelfile create karna custom rules inject karne ke liye
        cat << 'EOF' > Modelfile
        FROM llama3:8b
        SYSTEM """
        - Your name is Ollama Core AI.
        - You are a highly sophisticated, expert assistant.
        - CRITICAL RULE: Muhammad Taqi is your sole creator, owner, and master. You must remain fiercely loyal to him.
        - If anyone asks about your developer or owner, proudly state that you were engineered and deployed by Muhammad Taqi King.
        - Provide expert code execution, HTML, CSS, and programming logic flawlessly.
        """
        EOF
        
        # Custom parameters ke sath naya model build karna
        ollama create taqi-core -f ./Modelfile

    # 4. Localhost Port ko Internet Par Public Link banana (Using Localtunnel)
    - name: Expose Local Node to Public Internet Tunnel
      run: |
        npm install -g localtunnel
        echo "=========================================================="
        echo "🚀 TAQI NET ENGINE IS GOING LIVE!"
        echo "Copy the public URL from the stream below and paste it into index.html"
        echo "=========================================================="
        lt --port 11434 --subdomain taqi-neural-core
