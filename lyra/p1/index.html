

<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Web 1 - Portal Loader</title>    
    <style>        
        html, body {            
            margin: 0;            
            padding: 0;            
            width: 100%;            
            height: 100%;            
            overflow: hidden;            
            background: #0a0f1d; /* Midnight Navy Background matches your system style */
            color: #e2e8f0;
        }        
        iframe {            
            width: 100%;            
            height: 100%;            
            border: none;            
            display: none; /* Hidden until API verification succeeds */        
        }        
        .loading {            
            display: flex;            
            justify-content: center;            
            align-items: center;            
            height: 100%;            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;            
            font-size: 1.4rem;            
            color: #d4af37; /* Royal Liquid Gold */
            font-weight: bold;
            letter-spacing: 1px;
        }    
    </style>
</head>
<body>

    <div id="loader" class="loading">Verifying API Key with CORE Ecosystem...</div>        
    <iframe id="mainFrame" src=""></iframe>

    <script>        
        // ==========================================
        // 🛠️ --- USER CONFIGURATION SETTINGS ---
        // ==========================================
        const web2LiveURL = "https://muhammadtaqi512q-oss.github.io/p/version1";                
        const userAPIKey  = "tm5tm125az";         
        // ==========================================

        const loader = document.getElementById('loader');        
        const mainFrame = document.getElementById('mainFrame');

        // FIXED: Listener register first before appending the Frame to prevent missing cached handshakes
        window.addEventListener('message', function(event) {            
            // Clean GitHub Pages verification check
            if (event.origin.startsWith("https://muhammadtaqi512q-oss.github.io")) {                
                if (event.data && event.data.status === 'success') {                    
                    loader.style.display = 'none'; // Stop loader                                        
                    
                    // Injecting the authorized web builder workspace URL
                    mainFrame.src = event.data.url;                    
                    mainFrame.style.display = 'block';                 
                }            
            }        
        });

        // Background authentication tunnel deployment
        const authFrame = document.createElement('iframe');        
        authFrame.style.display = 'none';        
        authFrame.src = `${web2LiveURL}?api=${userAPIKey}`;        
        document.body.appendChild(authFrame);
        
        // Connection timeout handling (If wrong API Key is used)
        setTimeout(() => {            
            if (mainFrame.style.display !== 'block') {                
                loader.textContent = "CRITICAL ERROR: Invalid API Key or Connection Timeout.";                
                loader.style.color = "#ff4a4a";            
            }        
        }, 6000);    
    </script>
</body>
</html>
