<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLLAMA CORE // Local Workflow Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #02040a;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex flex-col justify-between p-6">

    <header class="w-full max-w-4xl mx-auto flex justify-between items-center glass-panel rounded-2xl px-6 py-4 border border-slate-900 shadow-xl">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></div>
            <span class="text-xs font-mono tracking-widest text-emerald-400 uppercase">OLLAMA WORKFLOW NODE</span>
        </div>
        <input type="text" id="tunnelUrl" placeholder="Paste Localtunnel URL here..." class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1 text-xs text-emerald-400 outline-none w-64 font-mono">
    </header>

    <main class="flex-1 w-full max-w-2xl mx-auto my-6 flex flex-col justify-between">
        <div id="chat-output" class="w-full flex-1 min-h-[50vh] max-h-[60vh] overflow-y-auto space-y-4 px-2 py-4 flex flex-col">
            <div class="bg-slate-950/60 rounded-xl p-4 border border-slate-900 font-mono text-xs text-slate-500 leading-relaxed">
                > Local server tunnel routing engine ready.<br>
                > Owner signature verified: <span class="text-emerald-400">Muhammad Taqi King</span><br>
                > Awaiting postMessage data stream from other bots...
            </div>
        </div>
    </main>

    <footer class="w-full max-w-2xl mx-auto">
        <div class="glass-panel rounded-2xl p-2 flex items-center gap-2 border border-slate-800">
            <input type="text" id="userInput" placeholder="Query local workflow node directly..." class="flex-1 bg-transparent border-0 outline-none px-4 py-3 text-sm text-slate-100" onkeypress="if(event.key === 'Enter') askOllamaCore()">
            <button id="sendBtn" onclick="askOllamaCore()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-mono text-xs font-bold px-6 py-3.5 rounded-xl transition cursor-pointer">GENERATE</button>
        </div>
    </footer>

    <script>
        // Direct execution via dashboard UI
        async function askOllamaCore() {
            const input = document.getElementById('userInput');
            const output = document.getElementById('chat-output');
            const btn = document.getElementById('sendBtn');
            let tunnelBase = document.getElementById('tunnelUrl').value.trim();
            const query = input.value.trim();

            if (!query || !tunnelBase) return;
            if(!tunnelBase.endsWith('/')) tunnelBase += '/';

            appendBubble('user', query);
            input.value = '';
            btn.disabled = true; btn.innerText = "PROCESSING...";

            const loaderId = appendBubble('system', "Streaming request to GitHub local container runner...");

            try {
                // Ollama Native local API generation link endpoint
                const response = await fetch(`${tunnelBase}api/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "taqi-core", // Triggering your custom local built model
                        prompt: query,
                        stream: false
                    })
                });

                const data = await response.json();
                document.getElementById(loaderId).remove();
                appendBubble('ai', data.response);

            } catch (error) {
                document.getElementById(loaderId).remove();
                appendBubble('ai', "CRITICAL: Unable to synchronize response streams. Check tunnel status.");
                console.error(error);
            } finally {
                btn.disabled = false; btn.innerText = "GENERATE";
            }
        }

        // =========================================================================
        // 📡 CROSS-BOT INTER-COMMUNICATION LISTENER (For other users' AIs)
        // =========================================================================
        window.addEventListener("message", async function(event) {
            let tunnelBase = document.getElementById('tunnelUrl').value.trim();
            if (!tunnelBase) return;
            if(!tunnelBase.endsWith('/')) tunnelBase += '/';

            if (event.data && event.data.type === "REQUEST_LOCAL_LLM") {
                try {
                    const res = await fetch(`${tunnelBase}api/generate`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "taqi-core",
                            prompt: event.data.prompt,
                            stream: false
                        })
                    });
                    const data = await res.json();
                    
                    // Sending response loop directly back to external caller bot
                    event.source.postMessage({
                        type: "LOCAL_LLM_RETURN",
                        response: data.response,
                        status: "success"
                    }, event.origin);

                } catch (e) {
                    event.source.postMessage({ type: "LOCAL_LLM_RETURN", status: "failed" }, event.origin);
                }
            }
        });

        function appendBubble(sender, text) {
            const output = document.getElementById('chat-output');
            const bubble = document.createElement('div');
            const id = 'node-' + Date.now(); bubble.id = id;

            if (sender === 'user') {
                bubble.className = "max-w-[85%] bg-slate-950 text-slate-200 self-end ml-auto border border-slate-900 p-4 rounded-2xl text-sm leading-relaxed";
            } else if (sender === 'system') {
                bubble.className = "text-emerald-500/60 font-mono text-xs animate-pulse p-2 self-start";
            } else {
                bubble.className = "max-w-[85%] glass-panel text-slate-100 self-start mr-auto border-l-2 border-emerald-500 font-mono text-[13px] p-4 rounded-2xl leading-relaxed whitespace-pre-wrap";
            }

            bubble.innerText = text;
            output.appendChild(bubble);
            output.scrollTop = output.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
