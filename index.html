<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Free Gemini AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-gray-800 p-4 text-center text-xl font-bold border-b border-gray-700 shadow-lg">
        🤖 My Custom Gemini AI Agent
    </header>

    <!-- Chat Window -->
    <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 max-w-3xl w-full mx-auto">
        <!-- AI Welcome Message -->
        <div class="flex items-start gap-2.5">
            <div class="bg-blue-600 p-2.5 rounded-e-xl rounded-es-xl max-w-[80%]">
                <p class="text-sm font-semibold mb-1">AI Assistant</p>
                <p class="text-sm">Hello! Main aapka free AI assistant hoon. Aap mujhse kuch bhi pooch sakte hain!</p>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="bg-gray-800 p-4 border-t border-gray-700">
        <div class="max-w-3xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="Type your message here..." 
                   class="flex-1 bg-gray-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="sendMessage()" id="send-btn" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-2 rounded-lg transition duration-200">
                Send
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Enter key se send karne ke liye
        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        async function sendMessage() {
            const prompt = userInput.value.trim();
            if (!prompt) return;

            // User ka message screen par dikhana
            appendMessage(prompt, 'User', 'bg-gray-700 text-right ml-auto rounded-s-xl rounded-ee-xl');
            userInput.value = '';
            
            // Loading State
            sendBtn.disabled = true;
            sendBtn.innerText = "Thinking...";
            
            // AI Response Placeholder
            const aiMessageId = appendMessage('Thinking...', 'AI Assistant', 'bg-blue-600 rounded-e-xl rounded-es-xl');

            try {
                // Bina kisi API Key ke Free AI Serverless Route call karna
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai`);
                const data = await response.text();
                
                // Response text ko update karna
                document.getElementById(aiMessageId).innerText = data;
            } catch (error) {
                document.getElementById(aiMessageId).innerText = "Sorry, network error ya server down hone ki wajah se response nahi mil saka.";
            }

            sendBtn.disabled = false;
            sendBtn.innerText = "Send";
        }

        function appendMessage(text, sender, bgClass) {
            const id = 'msg-' + Math.random().toString(36).substr(2, 9);
            const msgHtml = `
                <div class="flex items-start gap-2.5 ${sender === 'User' ? 'justify-end' : ''}">
                    <div class="${bgClass} p-3 max-w-[80%] shadow-md">
                        <p class="text-xs font-bold opacity-75 mb-1">${sender}</p>
                        <p class="text-sm whitespace-pre-line" id="${id}">${text}</p>
                    </div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', msgHtml);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto Scroll to bottom
            return id;
        }
    </script>
</body>
</html>
